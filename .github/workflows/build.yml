name: Build And Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_note:
        description: 'Optional note for the release body'
        required: false
        default: ''

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: 3.6.1

      - name: Convert to PDF
        run: pandoc ./modern_physics_notes.md -o ./modern_physics_notes.pdf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Modern_Physics_Notes
          path: ./modern_physics_notes.pdf

      - name: Set BUILD_DATE environment variable
        run: echo "BUILD_DATE=$(date --rfc-3339=date)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Date-${{ env.BUILD_DATE }}
          name: Release ${{ github.ref_name }}
          body: |
            PDF Release for: ${{ env.BUILD_DATE }}
            ${{ github.event.inputs.release_note }}
          draft: false
          prerelease: false
          files: ./modern_physics_notes.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
