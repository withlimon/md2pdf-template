name: Build And Release
# last update,i tried 7 to 11 30 for4 hr 30 min.So
# Not agin in my life i will use ai or printed note

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_note:
        description: 'Optional note for the release body'
        required: false
        default: ''

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install markdown-convert
        run: pip install markdown-convert

      - name: Convert to PDF
        run: markdown-convert ./modern_physics_notes.md --out=./modern_physics_notes.pdf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Modern_Physics_Notes
          path: ./modern_physics_notes.pdf

      - name: Set BUILD_DATE environment variable
        run: echo "BUILD_DATE=$(date --rfc-3339=date)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Date-${{ env.BUILD_DATE }}
          name: Release ${{ github.ref_name }}
          body: |
            PDF Release for: ${{ env.BUILD_DATE }}
            ${{ github.event.inputs.release_note }}
          draft: false
          prerelease: false
          files: ./modern_physics_notes.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
